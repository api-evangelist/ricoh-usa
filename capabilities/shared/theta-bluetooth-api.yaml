name: theta-bluetooth-api
title: RICOH THETA Bluetooth API Capabilities
description: GATT-based BLE capabilities for controlling RICOH THETA cameras (V, Z1, X, A1).
provider: ricoh-usa
api: theta-bluetooth-api
capabilities:
  - id: discover-camera
    title: Discover Camera
    description: Scan for nearby THETA cameras advertising the Ricoh service UUID.
    operation: bleDiscover
    tags: [Read, Network]
  - id: read-camera-info
    title: Read Camera Information
    description: Read GATT characteristics exposing model, firmware, serial, and battery.
    operation: bleReadCameraInformation
    tags: [Read, Device]
  - id: notify-shutter
    title: Notify Shutter
    description: Subscribe to shutter event notifications from the camera.
    operation: bleNotifyShutter
    tags: [Read, Shooting, Streaming]
  - id: write-shutter
    title: Write Shutter
    description: Trigger an image capture by writing to the shutter control characteristic.
    operation: bleWriteShutter
    tags: [Write, Shooting]
  - id: configure-wifi
    title: Configure Wi-Fi
    description: Hand off Wi-Fi credentials so the camera can join an access point.
    operation: bleConfigureWifi
    tags: [Write, Network]
  - id: read-plugin-state
    title: Read Plug-in State
    description: Query and control which plug-in is active over BLE.
    operation: bleReadPluginState
    tags: [Read, Plugins]
