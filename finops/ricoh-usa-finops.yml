description: |
  Ricoh USA's developer surfaces split into a one-time hardware-bundled cost (THETA cameras with
  open device APIs) and contract-priced cloud / workflow services (RICOH360 Cloud API and Ricoh
  Smart Integration). Neither track exposes a metered per-call billing feed today, so FinOps
  mapping is structural: device CapEx for THETA, OpEx contract for cloud and MFP workflows.
notes: |
  No public consumption-based pricing or FOCUS billing feed exists for Ricoh USA APIs. Cost
  attribution flows through (1) the hardware purchase line for THETA and (2) the master
  managed-services / cloud agreement for RICOH360 and Smart Integration.
