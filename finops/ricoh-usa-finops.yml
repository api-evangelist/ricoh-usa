meters:
  - name: theta_device
    description: Per-camera CapEx; unlocks unlimited use of the open THETA device APIs (Web / BLE / USB).
    unit: device
    aggregation: count
    dimensions:
      - model
      - serialNumber
  - name: ricoh360_cloud_contract
    description: Annual contract for RICOH360 Cloud API access; not metered per call publicly.
    unit: contract
    aggregation: count
    dimensions:
      - account
  - name: smart_integration_contract
    description: Bundled MFP workflow license; tied to managed-services agreement.
    unit: contract
    aggregation: count
    dimensions:
      - account
principles:
  - name: Visibility
    description: Track THETA hardware as CapEx in the field-team or imaging cost center; track RICOH360 Cloud and Smart Integration as OpEx under the master Ricoh agreement.
  - name: Allocation
    description: Allocate THETA device costs to the business unit that operates the cameras (construction, real estate, insurance); allocate cloud / MFP contracts to the IT or workplace-services owner.
  - name: Optimization
    description: For THETA Web API, prefer batch operations (single startCapture / listFiles / delete cycles) over per-frame polling. For RICOH360 Cloud, consolidate ingestion windows to fit contract volume bands.
  - name: Accountability
    description: Operational team owns camera hardware fleet; IT / facilities owns the Ricoh master contract that covers cloud and MFP workflows. Review utilization at managed-services renewal.
